<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends 'base.html' %}

{% block content %}
<h3>🔑 Reset Password — {{ reset_user.username }}</h3>
<p class="text-muted">Role: {{ reset_user.get_role_display }}</p>
<hr>

<div class="row">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-warning btn-lg">🔐 Reset Password</button>
                    <a href="{% url 'manage_users' %}" class="btn btn-outline-secondary btn-lg ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
